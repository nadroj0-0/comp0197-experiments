run_name: smoke_legacy_search

search:
  enabled: true
  sampling: stratified
  top_k_series: 2
  init_models: 2
  schedule:
    - epochs: 1
      keep: 1

train:
  split_protocol: yen_v1
  weight_protocol: yen_v1
  data_dir: ./data
  sampling: top
  top_k_series: 5
  seq_len: 28
  horizon: 28
  autoregressive: true
  use_normalise: false
  epochs: 1
  early_stopping_patience: 2
  early_stopping_min_delta: 0.0005
  batch_size: 256
  num_workers: 0
  seed: 42

eval:
  data_dir: ./data
  sampling: top
  top_k_series: 5

models:
  - baseline_gru_det
