# transformer_det.yml — Full Transformer with HorizonConditionedHead, MSE loss
model_name: transformer_det
model_type: transformer
probabilistic: false

train_config:
  epochs: 60
  seed: 42
  horizon: 28
  seq_len: 28
  autoregressive: true
  use_normalise: false
  feature_set: sales_only
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0005
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  d_model: 256
  layers: 2
  dropout: 0.1
  ff_dim: 512
  n_heads: 8

best_config: {}

search_space:
  optimiser_params.lr: [0.0001, 0.003, log]
  optimiser_params.weight_decay: [1.0e-7, 0.01, log]
  d_model: [128, 512, uniform]
  layers: [2, 6, uniform]
  dropout: [0.05, 0.3, uniform]
  ff_dim: [256, 1024, uniform]
  clip_grad_norm: [0.5, 2.0, uniform]
