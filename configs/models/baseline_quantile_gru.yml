# baseline_quantile_gru.yml — Vanilla GRU, Pinball loss (quantile regression)
model_name: baseline_quantile_gru
model_type: baseline_quantile_gru
probabilistic: false

train_config:
  autoregressive: true
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  hidden: 64
  layers: 1
  dropout: 0.0
  quantiles: [0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 0.9, 0.95, 0.975]

best_config: {}

# Pinball gradients well-behaved — wider lr range than Gaussian
search_space:
  optimiser_params.lr: [5.0e-4, 0.002, log]
  optimiser_params.weight_decay: [1.0e-5, 5.0e-4, log]
  hidden: [[64, 96, 128, 160], null, choice]
  layers: [[1, 2], null, choice]
  dropout: [0.0, 0.15, uniform]
  clip_grad_norm: [0.4, 1.0, uniform]
