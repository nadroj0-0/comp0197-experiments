# gru_prob.yml — Full GRU with HorizonConditionedHead, Gaussian NLL loss
model_name: gru_prob
model_type: gru
probabilistic: true

train_config:
  epochs: 60
  seed: 42
  horizon: 28
  seq_len: 28
  autoregressive: true
  use_normalise: false
  feature_set: sales_only
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0005
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 0.5
  hidden: 256
  layers: 2
  dropout: 0.15
  sigma_reg: 0.001

best_config: {}

search_space:
  optimiser_params.lr: [5.0e-5, 0.001, log]
  optimiser_params.weight_decay: [1.0e-7, 0.005, log]
  hidden: [128, 512, uniform]
  layers: [1, 3, uniform]
  dropout: [0.05, 0.35, uniform]
  clip_grad_norm: [0.25, 1.5, uniform]
  sigma_reg: [1.0e-4, 0.05, log]
