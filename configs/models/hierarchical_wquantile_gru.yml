# hierarchical_wquantile_gru.yml — GRU with hierarchy embeddings, revenue-weighted pinball loss
model_name: hierarchical_wquantile_gru
model_type: hierarchical_wquantile_gru
probabilistic: false

train_config:
  autoregressive: true
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 0.5           # tighter — revenue weighting amplifies gradients from high-value items
  hidden: 128
  layers: 2
  dropout: 0.1
  embed_dim: 8
  quantiles: [0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 0.9, 0.95, 0.975]

best_config: {}

# Slightly tighter than standard quantile — revenue weighting can amplify gradients
search_space:
  optimiser_params.lr: [4.0e-4, 0.0015, log]
  optimiser_params.weight_decay: [1.0e-5, 5.0e-4, log]
  hidden: [[160, 192, 224, 256], null, choice]
  layers: [[1, 2], null, choice]
  dropout: [0.04, 0.15, uniform]
  embed_dim: [[6, 8, 10], null, choice]
  clip_grad_norm: [0.3, 0.9, uniform]
