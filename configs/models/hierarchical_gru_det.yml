# hierarchical_gru_det.yml — GRU with hierarchy embeddings, MSE loss (deterministic)
model_name: hierarchical_gru_det
model_type: hierarchical_gru
probabilistic: false

train_config:
  autoregressive: false
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  hidden: 128
  layers: 2
  dropout: 0.1
  embed_dim: 8

best_config: {}

search_space:
  optimiser_params.lr: [5.0e-4, 0.002, log]
  optimiser_params.weight_decay: [1.0e-5, 5.0e-4, log]
  hidden: [[160, 192, 224, 256], null, choice]
  layers: [[1, 2], null, choice]
  dropout: [0.04, 0.15, uniform]
  embed_dim: [[6, 8, 10], null, choice]
  clip_grad_norm: [0.4, 1.0, uniform]
