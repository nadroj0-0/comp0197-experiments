# baseline_gru_prob.yml — Vanilla GRU, Gaussian NLL loss (probabilistic)
model_name: baseline_gru_prob
model_type: baseline_gru
probabilistic: true

train_config:
  autoregressive: true
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  hidden: 64
  layers: 1
  dropout: 0.0
  sigma_reg: 0.001

best_config: {}

# Tighter lr range than det — Gaussian NLL loss landscape more sensitive
search_space:
  optimiser_params.lr: [5.0e-5, 0.005, log]
  optimiser_params.weight_decay: [1.0e-7, 0.001, log]
  hidden: [32, 128, uniform]
  layers: [1, 2, uniform]
  dropout: [0.0, 0.3, uniform]
  clip_grad_norm: [0.25, 1.5, uniform]
  sigma_reg: [1.0e-4, 0.05, log]
