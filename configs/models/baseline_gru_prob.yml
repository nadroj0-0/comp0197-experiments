# baseline_gru_prob.yml — Vanilla GRU, Gaussian NLL loss (probabilistic)
model_name: baseline_gru_prob
model_type: baseline_gru
probabilistic: true

train_config:
  autoregressive: true
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  hidden: 64
  layers: 1
  dropout: 0.0
  sigma_reg: 0.001

best_config: {}

# Tighter lr range than det — Gaussian NLL loss landscape more sensitive
search_space:
  optimiser_params.lr: [3.0e-4, 0.0015, log]
  optimiser_params.weight_decay: [1.0e-5, 5.0e-4, log]
  hidden: [[64, 96, 128, 160], null, choice]
  layers: [[1, 2], null, choice]
  dropout: [0.0, 0.15, uniform]
  clip_grad_norm: [0.25, 0.9, uniform]
  sigma_reg: [5.0e-4, 0.01, log]
