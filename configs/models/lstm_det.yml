# lstm_det.yml — Full LSTM with HorizonConditionedHead, MSE loss
model_name: lstm_det
model_type: lstm
probabilistic: false

train_config:
  autoregressive: true
  feature_set: sales_only
  optimiser: adamw
  optimiser_params:
    lr: 0.001
    weight_decay: 0.0001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 1.0
  hidden: 256
  layers: 2
  dropout: 0.15

best_config: {}

search_space:
  optimiser_params.lr: [5.0e-5, 0.005, log]
  optimiser_params.weight_decay: [1.0e-7, 0.005, log]
  hidden: [128, 512, uniform]
  layers: [1, 3, uniform]
  dropout: [0.05, 0.35, uniform]
  clip_grad_norm: [0.5, 2.0, uniform]
