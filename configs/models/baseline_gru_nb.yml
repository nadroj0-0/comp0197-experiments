# baseline_gru_nb.yml — Vanilla GRU, Negative Binomial NLL loss
model_name: baseline_gru_nb
model_type: baseline_gru_nb
probabilistic: true

train_config:
  epochs: 60
  seed: 42
  horizon: 28
  seq_len: 28
  autoregressive: true
  use_normalise: false
  feature_set: sales_hierarchy_dow
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0005
  optimiser: adamw
  optimiser_params:
    lr: 0.0005
    weight_decay: 0.001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 0.5
  hidden: 64
  layers: 1
  dropout: 0.0

best_config: {}

# Tightest lr + strongest wd — NB NLL most unstable, alpha can collapse
search_space:
  optimiser_params.lr: [5.0e-5, 0.001, log]
  optimiser_params.weight_decay: [1.0e-6, 0.01, log]
  hidden: [32, 128, uniform]
  layers: [1, 2, uniform]
  dropout: [0.0, 0.3, uniform]
  clip_grad_norm: [0.25, 1.0, uniform]
