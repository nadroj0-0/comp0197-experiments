# baseline_gru_nb.yml — Vanilla GRU, Negative Binomial NLL loss
model_name: baseline_gru_nb
model_type: baseline_gru_nb
probabilistic: true

train_config:
  autoregressive: true
  feature_set: sales_yen_hierarchy
  optimiser: adamw
  optimiser_params:
    lr: 0.0005
    weight_decay: 0.001
  scheduler: plateau
  scheduler_params:
    patience: 5
    factor: 0.5
  clip_grad_norm: 0.5
  hidden: 64
  layers: 1
  dropout: 0.0

best_config: {}

# Tightest lr + strongest wd — NB NLL most unstable, alpha can collapse
search_space:
  optimiser_params.lr: [2.0e-4, 0.001, log]
  optimiser_params.weight_decay: [1.0e-5, 0.001, log]
  hidden: [[64, 96, 128], null, choice]
  layers: [[1, 2], null, choice]
  dropout: [0.0, 0.12, uniform]
  clip_grad_norm: [0.25, 0.75, uniform]
